  function parseDateSort(s){
    if(!s) return '9999-12-31';
    // Already in YYYY-MM-DD format
    if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
    var qStarts={'1':'01','2':'04','3':'07','4':'10'};
    var months={jan:'01',feb:'02',mar:'03','mär':'03',apr:'04',mai:'05',may:'05',jun:'06',jul:'07',aug:'08',sep:'09',okt:'10',oct:'10',nov:'11',dez:'12',dec:'12'};
    // Take only first part if compound (e.g. "Q1/Q2 2026" or "Q4 2026 / Q1 2027")
    var first=s.split(/\/|\s*-\s*|\s+oder\s+/i)[0].trim();
    // Try on first part, then full string
    var attempts=[first,s];
    for(var i=0;i<attempts.length;i++){
      var t=attempts[i].trim();
      // Quarter: Q1 2026 or Q1CY2026 or Q12026
      var qm=t.match(/Q(\d)\s*(?:CY|FY)?\s*(\d{4})/i);
      if(qm) return qm[2]+'-'+(qStarts[qm[1]]||'01')+'-01';
      // H1/H2 YYYY
      var hm=t.match(/H(\d)\s*(?:CY|FY)?\s*(\d{4})/i);
      if(hm) return hm[2]+'-'+(hm[1]==='1'?'01':'07')+'-01';
      // Month YYYY: "Mai 2026", "voraussichtlich März 2026"
      var mm=t.toLowerCase().match(/([a-zä]{3,})[.\s]*(\d{4})/);
      if(mm){var mo=months[mm[1].slice(0,3)];if(mo)return mm[2]+'-'+mo+'-01';}
      // Just year
      var ym=t.match(/(\d{4})/);
      if(ym) return ym[1]+'-06-01';
    }
    return '9999-12-31';
  }


function FeedTab({companies,newsCache}){
  const [sortBy,setSortBy]=useState('event');
  const [viewMode,setViewMode]=useState('upcoming'); // 'upcoming'|'overdue'|'history'
  const [tickerFilter,setTickerFilter]=useState('all');
  const today=new Date(); today.setHours(0,0,0,0);

  function evtKey(e){
    var a=parseDateSort(e.date||e.dateSort);
    var b=parseDateSort(e.dateSort);
    return a>b?a:b;
  }

  function ampelOrder(a){return a==='rot'?0:a==='gelb'?1:a==='gruen'?2:3;}

  // Build one row per company
  var rows=companies.map(function(co){
    var evts=(co.events||[]).filter(function(e){return e.title&&e.dateSort;});
    evts.sort(function(a,b){return evtKey(a)>evtKey(b)?1:-1;});
    // Classify events
    var upcomingEvts=evts.filter(function(e){return new Date(parseDateSort(e.dateSort))>=today;});
    var overdueEvts=evts.filter(function(e){return new Date(parseDateSort(e.dateSort))<today;});
    // Match news using same logic as EventsTab getMatch
    var news=null;
    if(newsCache){
      // Try eventId match first against overdue then upcoming events
      var allEvtsForMatch=overdueEvts.slice().reverse().concat(upcomingEvts);
      for(var ei=0;ei<allEvtsForMatch.length;ei++){
        var em=newsCache.find(function(n){return n.ticker===co.ticker&&n.eventId===allEvtsForMatch[ei].id;});
        if(em){news=em;break;}
      }
      // Legacy fallback: prefer most recent overdue event
      if(!news){
        var legacy=newsCache.find(function(n){return n.ticker===co.ticker&&!n.eventId;});
        if(legacy) news=legacy;
      }
    }
    var hasHistory=!!news;
    // Pick event based on viewMode
    var nextEvt=null;
    if(viewMode==='upcoming') nextEvt=upcomingEvts[0]||null;
    else if(viewMode==='overdue'){
      // Show most recently overdue event (least overdue first)
      overdueEvts.sort(function(a,b){return a.dateSort>b.dateSort?-1:1;});
      nextEvt=overdueEvts[0]||null;
    }
    else nextEvt=upcomingEvts[0]||evts[0]||null;
    // Filter by viewMode: overdue = has overdue events AND no news match
    // history = has news match
    if(viewMode==='upcoming'&&!upcomingEvts.length) return null;
    if(viewMode==='overdue'&&(!overdueEvts.length||hasHistory)) return null;
    if(viewMode==='history'&&!hasHistory) return null;
    return {co,nextEvt,news,upcomingCount:upcomingEvts.length,overdueCount:overdueEvts.length};
  }).filter(function(r){
    if(!r) return false;
    if(tickerFilter!=='all'&&r.co.ticker!==tickerFilter) return false;
    return true;
  });

  // Sort
  if(sortBy==='event'){
    rows.sort(function(a,b){
      var ka=a.nextEvt?evtKey(a.nextEvt):'9999';
      var kb=b.nextEvt?evtKey(b.nextEvt):'9999';
      return ka>kb?1:-1;
    });
  } else if(sortBy==='news'){
    rows.sort(function(a,b){
      var ao=a.news?ampelOrder(a.news.ampel):3;
      var bo=b.news?ampelOrder(b.news.ampel):3;
      if(ao!==bo) return ao-bo;
      var ka=a.nextEvt?evtKey(a.nextEvt):'9999';
      var kb=b.nextEvt?evtKey(b.nextEvt):'9999';
      return ka>kb?1:-1;
    });
  } else {
    rows.sort(function(a,b){return a.co.ticker>b.co.ticker?1:-1;});
  }

  function priColor(p){return p==='high'?'var(--red)':p==='med'?'var(--yel)':p==='blue'?'var(--blu)':'var(--grn)';}
  function ampelColor(a){return a==='rot'?'var(--red)':a==='gelb'?'var(--yel)':'var(--grn)';}
  function ampelBg(a){return a==='rot'?'#FEF2F2':a==='gelb'?'#FFFBEB':'#ECFDF5';}
  function ampelBorder(a){return a==='rot'?'#FECACA':a==='gelb'?'#FDE68A':'#A7F3D0';}

  var allTickers=companies.map(function(co){return co.ticker;}).sort();

  return (
    <div>
      {/* View mode + Sort */}
      <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:14,flexWrap:'wrap'}}>
        {['upcoming','overdue','history'].map(function(v){
          var label=v==='upcoming'?'Upcoming':v==='overdue'?'Overdue':'History';
          var count=companies.reduce(function(acc,co){
            var evts=(co.events||[]).filter(function(e){return e.title&&e.dateSort;});
            if(v==='upcoming') return acc+(evts.filter(function(e){return new Date(parseDateSort(e.dateSort))>=today;}).length>0?1:0);
            if(v==='overdue') return acc+(evts.filter(function(e){return new Date(parseDateSort(e.dateSort))<today;}).length>0?1:0);
            return acc+((newsCache&&newsCache.find(function(n){return n.ticker===co.ticker;}))?1:0);
          },0);
          return <button key={v} className={'chip'+(viewMode===v?' active':'')} onClick={function(){setViewMode(v);setTickerFilter('all');}}>
            {label} <span style={{marginLeft:4,background:'var(--brd)',borderRadius:20,padding:'0 6px',fontSize:10}}>{count}</span>
          </button>;
        })}
        <div style={{width:1,height:20,background:'var(--brd)',margin:'0 4px'}}/>
        {['event','news','ticker'].map(function(s){
          return <button key={s} className={'chip'+(sortBy===s?' active':'')} onClick={function(){setSortBy(s);}}>
            {s==='event'?'📅 Event':s==='news'?'📰 News':'🔤 A-Z'}
          </button>;
        })}
        <span style={{marginLeft:'auto',fontSize:12,color:'var(--mut)',fontWeight:600}}>{rows.length} Aktien</span>
      </div>

      {/* Ticker filter chips */}
      <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:16}}>
        <button className={'chip'+(tickerFilter==='all'?' active':'')} onClick={function(){setTickerFilter('all');}}>Alle</button>
        {allTickers.map(function(t){
          return <button key={t} className={'chip'+(tickerFilter===t?' active':'')} onClick={function(){setTickerFilter(t);}}>
            {t}
          </button>;
        })}
      </div>

      {/* Header row */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:0,marginBottom:6,padding:'0 4px'}}>
        <div style={{fontSize:10,fontWeight:700,color:'var(--mut)',textTransform:'uppercase',letterSpacing:'.5px',paddingLeft:16}}>
          {viewMode==='upcoming'?'Nächstes Event':viewMode==='overdue'?'Überfälliges Event':'Letztes Event'}
        </div>
        <div style={{fontSize:10,fontWeight:700,color:'var(--mut)',textTransform:'uppercase',letterSpacing:'.5px',paddingLeft:16}}>Aktuellste News</div>
      </div>

      {rows.map(function(row){
        var co=row.co; var ev=row.nextEvt; var news=row.news;
        var evDate=ev?new Date(parseDateSort(ev.dateSort)):null;
        var daysAway=evDate?Math.round((evDate-today)/(1000*60*60*24)):null;
        var isUrgent=daysAway!==null&&daysAway<=7;
        return (
          <div key={co.id} style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:1,marginBottom:2}}>
            {/* LEFT: Event */}
            <div style={{background:'var(--card)',border:'1px solid var(--brd)',borderRight:'none',borderRadius:'12px 0 0 12px',padding:'14px 16px',borderLeft:'3px solid '+(ev?priColor(ev.priority):'var(--brd)')}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8,marginBottom:6}}>
                <div style={{display:'flex',gap:8,alignItems:'center',flex:1,minWidth:0}}>
                  <span style={{fontSize:12,fontWeight:800,color:'var(--pri)',flexShrink:0}}>{co.ticker}</span>
                  <span style={{fontSize:11,color:'var(--mut)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1}}>{co.name}</span>
                </div>
                {daysAway!==null&&<span style={{fontSize:10,fontWeight:700,color:isUrgent?'var(--red)':'var(--mut)',flexShrink:0,background:isUrgent?'#FEF2F2':'var(--card2)',padding:'2px 7px',borderRadius:20,border:'1px solid '+(isUrgent?'#FECACA':'var(--brd)')}}>{daysAway===0?'Heute':daysAway===1?'Morgen':daysAway>0?'in '+daysAway+'d':Math.abs(daysAway)+'d überfällig'}</span>}
              </div>
              {ev?<div>
                <div style={{fontSize:12,fontWeight:600,color:'var(--txt)',marginBottom:3,lineHeight:1.4}}>{ev.title}</div>
                <div style={{fontSize:11,color:'var(--mut)'}}>{ev.date}</div>
                {ev.desc&&<div style={{fontSize:11,color:'var(--mut)',marginTop:4,lineHeight:1.5,overflow:'hidden',display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical'}}>{ev.desc}</div>}
              </div>:<div style={{fontSize:11,color:'var(--dim)'}}>Kein Event</div>}
            </div>
            {/* RIGHT: News */}
            <div style={{background:'var(--card)',border:'1px solid var(--brd)',borderLeft:'none',borderRadius:'0 12px 12px 0',padding:'14px 16px',borderRight:'3px solid '+(news?ampelColor(news.ampel):'var(--brd)')}}>
              {news?<div>
                <div style={{display:'flex',gap:8,alignItems:'flex-start',marginBottom:6}}>
                  <span style={{background:ampelBg(news.ampel),border:'1px solid '+ampelBorder(news.ampel),color:ampelColor(news.ampel),fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:20,flexShrink:0}}>{news.ampel==='gruen'?'Positiv':news.ampel==='gelb'?'Neutral':'Risiko'}</span>
                  <span style={{fontSize:12,fontWeight:600,color:'var(--txt)',lineHeight:1.4}}>{news.headline}</span>
                </div>
                {news.news&&news.news.slice(0,2).map(function(n,i){
                  return <div key={i} style={{fontSize:11,color:'var(--mut)',padding:'4px 0',borderTop:i>0?'1px solid var(--brd)':'none',lineHeight:1.5}}>
                    {n.url?<a href={n.url} target="_blank" rel="noopener" style={{color:'var(--mut)',textDecoration:'underline',textDecorationColor:'var(--brd)'}}>{n.title}{n.date&&' ('+n.date+')'}</a>:<span>{n.title}{n.date&&' ('+n.date+')'}</span>}
                  </div>;
                })}
                {news.searchedAt&&<div style={{fontSize:10,color:'var(--dim)',marginTop:6}}>Stand: {news.searchedAt}</div>}
              </div>:<div style={{fontSize:11,color:'var(--dim)',display:'flex',alignItems:'center',height:'100%'}}>Keine News verfügbar</div>}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function EventsTab({companies,newsCache}){
  const [view,setView]=useState('upcoming');
  const [filter,setFilter]=useState('all');
  const today=new Date(); today.setHours(0,0,0,0);

  // For each event, find matching newsCache entry (per eventId)
  function getMatch(co,ev){
    if(!newsCache||!newsCache.length) return null;
    if(!co||!ev) return null;
    // New format: per eventId
    var m=newsCache.find(function(n){return n.ticker===co.ticker&&n.eventId===ev.id;});
    if(m) return m;
    // Legacy fallback: attach to most overdue event first, then upcoming, by priority
    var legacy=newsCache.find(function(n){return n.ticker===co.ticker&&!n.eventId;});
    if(!legacy) return null;
    var today2=new Date(); today2.setHours(0,0,0,0);
    var evts=(co.events||[]).filter(function(e){return e.title&&e.dateSort;});
    // Split overdue vs upcoming
    var overdueE=evts.filter(function(e){return new Date(e.dateSort)<today2;});
    var upcomingE=evts.filter(function(e){return new Date(e.dateSort)>=today2;});
    // Sort overdue: most recent first (least overdue = most relevant)
    overdueE.sort(function(a,b){return a.dateSort>b.dateSort?-1:1;});
    // Sort upcoming: soonest first, by priority
    upcomingE.sort(function(a,b){
      var pa={high:0,med:1,blue:2,low:3}[a.priority]||1;
      var pb={high:0,med:1,blue:2,low:3}[b.priority]||1;
      if(pa!==pb) return pa-pb;
      return a.dateSort>b.dateSort?1:-1;
    });
    // Prefer overdue events — news likely refers to them
    var best=(overdueE[0]||upcomingE[0]);
    return (best&&best.id===ev.id)?legacy:null;
  }

  var allEvts=companies.flatMap(function(co){
    return co.events.filter(function(e){return e.title&&e.dateSort;}).map(function(e){
      var ps=parseDateSort(e.dateSort);var d=new Date(ps);var overdue=ps!=='9999-12-31'&&!isNaN(d.getTime())&&d<today;
      var match=getMatch(co,e);
      return Object.assign({},e,{coId:co.id,overdue:overdue,match:match});
    });
  }).sort(function(a,b){
    var ka=parseDateSort(a.date||a.dateSort)>parseDateSort(a.dateSort)?parseDateSort(a.date||a.dateSort):parseDateSort(a.dateSort);
    var kb=parseDateSort(b.date||b.dateSort)>parseDateSort(b.dateSort)?parseDateSort(b.date||b.dateSort):parseDateSort(b.dateSort);
    return ka>kb?1:-1;
  });

  var upcomingEvts=allEvts.filter(function(e){return !e.overdue;});
  var overdueEvts=allEvts.filter(function(e){return e.overdue&&!e.match;});
  var historyEvts=allEvts.filter(function(e){return !!e.match;});

  var displayed=view==='upcoming'?upcomingEvts:view==='overdue'?overdueEvts:historyEvts;
  var visible=filter==='all'?displayed:displayed.filter(function(e){return e.coId===filter;});
  function evtSortKey(e){var a=parseDateSort(e.date||e.dateSort);var b=parseDateSort(e.dateSort);return a>b?a:b;}
  var months=[...new Set(visible.map(function(e){var ps=evtSortKey(e);var d=new Date(ps);return isNaN(d.getTime())||ps==='9999-12-31'?(e.date||e.dateSort||'TBD'):d.toLocaleDateString('de-DE',{month:'long',year:'numeric'});}))];

  var aIcon=function(a){return a==='gruen'?'🟢':a==='gelb'?'🟡':'🔴';};
  var aColor=function(a){return a==='gruen'?'var(--grn)':a==='gelb'?'var(--yel)':'var(--red)';};

  function launchAllOverdueSearch(){
    var evList=overdueEvts.map(function(e){
      var co=companies.find(function(c){return c.id===e.coId;});
      return co?co.ticker+' | Event: '+e.title+' (erwartet: '+e.date+')':'';
    }).filter(Boolean).join('\n');
    var prompt='Overdue Event News-Recherche fuer '+overdueEvts.length+' ueberfaellige Investment-Events:\n\n'+evList+'\n\nBitte suche gezielt nach News die zeigen ob diese Events eingetreten sind oder relevante Updates gibt. Nur Events mit wirklich passenden News aufnehmen. Antworte mit JSON-Array (kein Markdown):\n[{"ticker":"...","eventId":"...","ampel":"gruen","headline":"1 Satz","news":[{"title":"...","date":"TT.MM.JJJJ","url":"https://..."}],"searchedAt":"JJJJ-MM-TT"}]\n\nWICHTIG: Am Ende den kompletten newsCache als JSON-Block ausgeben (\x60\x60\x60json [...]\x60\x60\x60) damit er in die Portfolio-App kopiert werden kann. KEIN Artifact, KEIN Download.';
    window.open('https://claude.ai/new?q='+encodeURIComponent(prompt),'_blank');
  }

  function NewsBlock({match}){
    if(!match||!match.news||!match.news.length) return null;
    return <div style={{marginTop:8,background:'#F8FAFC',borderRadius:6,overflow:'hidden'}}>
      {match.news.map(function(n,j){
        return <div key={j} style={{padding:'6px 10px',borderBottom:j<match.news.length-1?'1px solid var(--brd)':'none',display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8}}>
          <div style={{flex:1}}>
            {n.url?<a href={n.url} target="_blank" rel="noopener" style={{color:'var(--txt)',fontSize:11,lineHeight:1.4,textDecoration:'underline',textDecorationColor:'rgba(255,255,255,.2)'}}>{n.title}{n.date&&' ('+n.date+')'}</a>:<span style={{color:'var(--txt)',fontSize:11}}>{n.title}{n.date&&' ('+n.date+')'}</span>}
          </div>
        </div>;
      })}
    </div>;
  }

  return <div>
    <div style={{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap'}}>
      <button className={'chip'+(view==='upcoming'?' active':'')} onClick={()=>setView('upcoming')}>Upcoming ({upcomingEvts.length})</button>
      <button className={'chip'+(view==='overdue'?' active':'')} onClick={()=>setView('overdue')} style={overdueEvts.length>0?{borderColor:'var(--red)',color:'var(--red)'}:{}}>Overdue ({overdueEvts.length})</button>
      <button className={'chip'+(view==='history'?' active':'')} onClick={()=>setView('history')} style={historyEvts.length>0?{borderColor:'var(--grn)',color:'var(--grn)'}:{}}>History ({historyEvts.length})</button>
    </div>
    <div className="chips">
      <span style={{fontSize:11,color:'var(--dim)',marginRight:4}}>Aktie:</span>
      <button className={'chip'+(filter==='all'?' active':'')} onClick={()=>setFilter('all')}>Alle</button>
      {companies.map(function(co){return <button key={co.id} className={'chip'+(filter===co.id?' active':'')} onClick={()=>setFilter(co.id)}>{co.ticker}</button>;})}
    </div>
    {view==='overdue'&&overdueEvts.length>0&&<div style={{marginBottom:16}}>
      <button className="btn btn-pri" onClick={launchAllOverdueSearch}>Suche News fuer alle {overdueEvts.length} Overdue Events ↗</button>
    </div>}
    {visible.length===0?<div className="empty">Keine Events in dieser Ansicht.</div>:months.map(function(g){
      var items=visible.filter(function(e){var ps=evtSortKey(e);var d=new Date(ps);return(isNaN(d.getTime())||ps==='9999-12-31'?(e.date||e.dateSort||'TBD'):d.toLocaleDateString('de-DE',{month:'long',year:'numeric'}))===g;});
      if(!items.length) return null;
      var icon=view==='overdue'?'⏰':view==='history'?'✓':'📅';
      return <div key={g}>
        <div className="tl-mon">{icon} {g}</div>
        {items.map(function(e){
          var co=companies.find(function(c){return c.id===e.coId;});
          if(!co) return null;
          var pc=({high:'#ef4444',med:'#f59e0b',blue:'#3b82f6',low:'#22c55e'})[e.priority]||'#888';
          var cls=({high:'tl-item tl-h',med:'tl-item tl-m',blue:'tl-item tl-b',low:'tl-item tl-l'})[e.priority]||'tl-item tl-b';
          var bc=e.priority==='high'?'239,68,68':e.priority==='med'?'245,158,11':'59,130,246';
          return <div key={e.id+co.id}>
            <div className={cls} style={view==='overdue'?{borderLeft:'3px solid var(--red)'}:view==='history'?{borderLeft:'3px solid var(--grn)'}:{}}>
              <div className="tl-dot-col"><div className="tl-dot" style={{background:view==='overdue'?'var(--red)':view==='history'?'var(--grn)':pc}}></div></div>
              <div className="tl-body">
                <div className="tl-top">
                  <div className="tl-title">{co.name} – {e.title}</div>
                  <div className="tl-meta">
                    <span className="tl-date">{e.date}</span>
                    <span className="badge pill-o" style={{fontSize:10}}>{co.ticker}</span>
                    <span className="badge" style={{fontSize:10,background:'rgba('+bc+',.12)',color:pc,border:'1px solid rgba('+bc+',.2)'}}>{e.priority==='high'?'High':e.priority==='med'?'Medium':'Strukturell'}</span>
                    {view==='overdue'&&<span style={{fontSize:10,background:'#FEF2F2',color:'var(--red)',borderRadius:4,padding:'1px 6px',fontWeight:600}}>OVERDUE</span>}
                    {view==='history'&&e.match&&<span style={{fontSize:10,color:aColor(e.match.ampel)}}>{aIcon(e.match.ampel)}</span>}
                  </div>
                </div>
                {e.desc&&<div className="tl-desc">{e.desc}</div>}
                {e.wd.length>0&&<div className="tl-wd">{e.wd.map(function(w,i){return <div key={i} className="wd-row"><span className="wd-ico" style={{color:({up:'#22c55e',down:'#ef4444',neutral:'#f59e0b'})[w.t]}}>{{up:'▲',down:'▼',neutral:'→'}[w.t]}</span><span>{w.text}</span></div>;})}</div>}
                {(view==='upcoming'||view==='history')&&e.match&&<div style={{marginTop:8}}>
                  <div style={{fontSize:11,fontWeight:600,color:aColor(e.match.ampel),marginBottom:4}}>{aIcon(e.match.ampel)} {e.match.headline}</div>
                  <NewsBlock match={e.match}/>
                </div>}
                {view==='overdue'&&e.match&&e.match.searchedAt&&!e.match.news&&<div style={{fontSize:11,color:'var(--dim)',marginTop:6}}>Letzte Suche: {e.match.searchedAt} — keine relevanten News gefunden</div>}
                <div className="tl-lnks">
                  {co.analyseUrl&&<a href={co.analyseUrl} target="_blank" rel="noopener" className="lbtn lbtn-a">Analyse</a>}
                  {co.chatUrl&&<a href={co.chatUrl} target="_blank" rel="noopener" className="lbtn lbtn-c">Chat</a>}
                </div>
              </div>
            </div>
          </div>;
        })}
      </div>;
    })}
  </div>;
}

    const gd=await r.json();

    const prompt='News Update fuer alle '+companies.length+' Portfolio-Aktien ('+new Date().toLocaleDateString('de-DE')+'):\n\nTicker: '+tickers+'\n\nAnstehende & ueberfaellige Events (Prioritaet fuer News-Recherche):\n'+eventContext+'\n\nAnweisung:\n1. Fuer jeden Ticker: Pruefe zuerst ob die markierten Events (OVERDUE/UPCOMING) eingetreten sind oder neue relevante Informationen vorliegen. Priorisiere News mit direktem Bezug zu diesen Events.\n2. Falls keine event-spezifischen News gefunden: Fasse die wichtigsten allgemeinen News der letzten 7 Tage zusammen.\n3. Ampel-Bewertung: gruen=positiv fuer Investment-These, gelb=neutral/gemischt, rot=Risiko oder negative Entwicklung.'+deployNote;

  const aLabel=a=>a==='gruen'?'Positiv':a==='gelb'?'Neutral':'Risiko';

    <div className="sec-hdr">News Scan – Alle Aktien (letzte 7 Tage)</div>
    <div style={{padding:'16px 18px'}}>
      <p style={{fontSize:13,color:'var(--mut)',marginBottom:12}}>Claude Web-Recherche für alle Portfolio-Aktien. Neuen Scan starten — Deploy-Artifact am Ende aktualisiert die Daten hier.</p>
      <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
        <button className="btn btn-pri" onClick={launchUpdate}>News Update in Claude starten ↗</button>
        <button className="btn" onClick={loadCache} style={{fontSize:12}}>Aktualisieren</button>
        <button className="btn" onClick={()=>setPasteMode(v=>!v)} style={{fontSize:12}}>Paste & Deploy</button>
      </div>
      {timestamp&&<div style={{fontSize:11,color:'var(--dim)',marginTop:8}}>Letztes Update: {new Date(timestamp).toLocaleString('de-DE')}</div>}
    </div>
  </div>;

  const [pasteMode,setPasteMode]=useState(false);
  const [pasteVal,setPasteVal]=useState('');
  const [deploying,setDeploying]=useState(false);
  const [deployMsg,setDeployMsg]=useState('');

  async function deployPasted(){
    setDeploying(true); setDeployMsg('');
    try{
      const raw=pasteVal.trim();
      var clean=raw;while(clean.indexOf('\x60\x60\x60json')>=0){clean=clean.replace('\x60\x60\x60json','');}while(clean.indexOf('\x60\x60\x60')>=0){clean=clean.replace('\x60\x60\x60','');}clean=clean.trim();
      const nc=JSON.parse(clean);
      if(!Array.isArray(nc)) throw new Error('Kein Array');
      const r=await fetch('/api/deploy-news',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({newsCache:nc})});
      const d=await r.json();
      if(!d.ok) throw new Error(d.error||'Unbekannter Fehler');
      setDeployMsg('✅ '+d.count+' Einträge deployed');
      setPasteVal(''); setPasteMode(false);
      setCache(nc);
      setTimestamp(new Date().toISOString());
      setStatus('done');
      if(onNewsUpdate) onNewsUpdate(nc);
    }catch(e){setDeployMsg('❌ '+e.message);}
    setDeploying(false);
  }

  const pastePanel=<div style={{background:'var(--card2)',border:'1px solid var(--brd)',borderRadius:10,padding:16,marginBottom:16}}>
    <div style={{fontSize:12,fontWeight:700,color:'var(--pri)',marginBottom:10,textTransform:'uppercase',letterSpacing:.4}}>News Cache aus Claude Chat einfügen</div>
    <textarea value={pasteVal} onChange={e=>setPasteVal(e.target.value)} rows={6} placeholder={'[{"ticker":"MU","eventId":"e1","ampel":"gruen","headline":"...","news":[...]},...]'} style={{width:'100%',marginBottom:10,fontFamily:'monospace',fontSize:11}}/>
    <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
      <button className="btn btn-pri" onClick={deployPasted} disabled={deploying||!pasteVal.trim()}>{deploying?'Deploying...':'Deploy'}</button>
      <button className="btn" onClick={()=>{setPasteMode(false);setPasteVal('');setDeployMsg('');}}>Abbrechen</button>
      {deployMsg&&<span style={{fontSize:12,color:deployMsg.startsWith('✅')?'var(--grn)':'var(--red)'}}>{deployMsg}</span>}
    </div>
  </div>;

  if(status==='loading') return <div>{header}{pasteMode&&pastePanel}<div style={{color:'var(--mut)',fontSize:13,padding:'12px 0'}}>Lade News-Cache...</div></div>;
  if(status==='empty') return <div>{header}{pasteMode&&pastePanel}<div className="empty">Noch kein News-Scan. Klicke "News Update in Claude starten".</div></div>;
  if(status==='error') return <div>{header}{pasteMode&&pastePanel}<div style={{color:'var(--red)',fontSize:13}}>Fehler beim Laden.</div></div>;

  const gc=cache.filter(r=>r.ampel==='gruen').length;
  const yc=cache.filter(r=>r.ampel==='gelb').length;
  const rc=cache.filter(r=>r.ampel==='rot').length;
  const visible=ampelFilter==='all'?cache:cache.filter(r=>r.ampel===ampelFilter);

  return <div>
    {header}
    {pasteMode&&pastePanel}
    <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap'}}>
      <button className={'chip'+(ampelFilter==='all'?' active':'')} onClick={()=>setAmpelFilter('all')}>Alle ({cache.length})</button>
      <button className={'chip'+(ampelFilter==='gruen'?' active':'')} onClick={()=>setAmpelFilter('gruen')} style={ampelFilter==='gruen'?{}:{color:'var(--grn)',borderColor:'rgba(34,197,94,.3)'}}>🟢 Positiv ({gc})</button>
      <button className={'chip'+(ampelFilter==='gelb'?' active':'')} onClick={()=>setAmpelFilter('gelb')} style={ampelFilter==='gelb'?{}:{color:'var(--yel)',borderColor:'rgba(245,158,11,.3)'}}>🟡 Neutral ({yc})</button>
      <button className={'chip'+(ampelFilter==='rot'?' active':'')} onClick={()=>setAmpelFilter('rot')} style={ampelFilter==='rot'?{}:{color:'var(--red)',borderColor:'rgba(239,68,68,.3)'}}>🔴 Risiko ({rc})</button>
    </div>
    {visible.map((r,i)=>{
      const co=companies.find(c=>c.ticker===r.ticker);
      return <div key={i} className="sec" style={{marginBottom:10}}>
        <div style={{padding:'12px 16px',display:'flex',gap:12,alignItems:'flex-start'}}>
          <div style={{fontSize:18,flexShrink:0,marginTop:2}}>{aIcon(r.ampel)}</div>
          <div style={{flex:1}}>
            <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:4,flexWrap:'wrap'}}>
              <span style={{fontSize:14,fontWeight:700,color:'#fff'}}>{r.ticker}</span>
              {co&&<span style={{fontSize:11,color:'var(--pri)'}}>- {co.name}</span>}
              <span style={{fontSize:11,fontWeight:600,color:aColor(r.ampel)}}>{aLabel(r.ampel)}</span>
            </div>
            <div style={{fontSize:13,fontWeight:600,color:'var(--txt)',marginBottom:4}}>{r.headline}</div>
            <div style={{fontSize:12,color:'var(--mut)',lineHeight:1.6,marginBottom:6}}>{r.eventMatch}</div>
            {r.news&&r.news.length>0&&<div style={{marginTop:8,background:'#F8FAFC',borderRadius:6,overflow:'hidden'}}>
              {r.news.map((n,j)=><div key={j} style={{padding:'7px 10px',borderBottom:j<r.news.length-1?'1px solid var(--brd)':'none',display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8}}>
                <div style={{flex:1}}>
                  {n.url?<a href={n.url} target="_blank" rel="noopener" style={{color:'var(--txt)',fontSize:12,lineHeight:1.4,textDecoration:'underline',textDecorationColor:'rgba(255,255,255,.2)'}}>{n.title}{n.date&&' ('+n.date+')'}</a>:<span style={{color:'var(--txt)',fontSize:12,lineHeight:1.4}}>{n.title}{n.date&&' ('+n.date+')'}</span>}
                </div>
              </div>)}
            </div>}
            <div style={{display:'flex',gap:6,marginTop:8}}>
              {co&&co.analyseUrl&&<a href={co.analyseUrl} target="_blank" rel="noopener" className="lbtn lbtn-a" style={{fontSize:10}}>Analyse</a>}
              {co&&co.chatUrl&&<a href={co.chatUrl} target="_blank" rel="noopener" className="lbtn lbtn-c" style={{fontSize:10}}>Chat</a>}
            </div>
          </div>
        </div>
      </div>;
    })}
  </div>
}

          <div className="form-row col3"><div className="fld"><label>Kurs</label><input value={d.price} onChange={e=>setF('price',e.target.value)}/></div><div className="fld"><label>Stand</label><input value={d.priceDate} onChange={e=>setF('priceDate',e.target.value)}/></div><div className="fld"><label>52W</label><input value={d.w52} onChange={e=>setF('w52',e.target.value)}/></div></div>
        </div>}
        {mt==='scores'&&<div>

function ManageTab({companies,onAdd,onEdit,onDelete,onReset,onSync,onPush,syncing}){
  const [analysePaste,setAnalysePaste]=useState('');
  const [analyseDeploying,setAnalyseDeploying]=useState(false);
  const [analyseMsg,setAnalyseMsg]=useState('');

  async function deployAnalyse(){
    setAnalyseDeploying(true); setAnalyseMsg('');
    try{
      const raw=analysePaste.trim();
      var clean=raw;while(clean.indexOf('\x60\x60\x60json')>=0){clean=clean.replace('\x60\x60\x60json','');}while(clean.indexOf('\x60\x60\x60')>=0){clean=clean.replace('\x60\x60\x60','');}clean=clean.trim();
      const co=JSON.parse(clean);
      if(!co.ticker) throw new Error('ticker fehlt');
      // Direct JSONBin merge
      var jbGet=await fetch('https://api.jsonbin.io/v3/b/'+JSONBIN_ID+'/latest',{headers:{'X-Master-Key':JSONBIN_KEY,'X-Bin-Meta':'false'}});
      var jbData=await jbGet.json();
      var coList=Array.isArray(jbData.companies)?jbData.companies.slice():[];
      var coIdx=coList.findIndex(function(x){return x.ticker===co.ticker;});
      var coExisting=coIdx>=0?coList[coIdx]:null;
      var coMerged=Object.assign({},coExisting||{id:'co_'+Date.now()},co);
      delete coMerged.analyseUrl;
      if(coIdx>=0){coList[coIdx]=coMerged;}else{coList.push(coMerged);}
      var jbPut=await fetch('https://api.jsonbin.io/v3/b/'+JSONBIN_ID,{method:'PUT',
        headers:{'Content-Type':'application/json','X-Master-Key':JSONBIN_KEY},
        body:JSON.stringify({companies:coList,pricesUpdatedAt:jbData.pricesUpdatedAt||'',newsCache:jbData.newsCache||[],newsCacheUpdatedAt:jbData.newsCacheUpdatedAt||''})
      });
      if(!jbPut.ok) throw new Error('JSONBin Fehler: '+jbPut.status);
      var coAction=coIdx>=0?'Analyse aktualisiert: ':'Neue Aktie angelegt: ';
      setAnalyseMsg('OK - '+coAction+co.ticker+' ('+coList.length+' gesamt)');
      setAnalysePaste('');
      if(onSync) onSync();
    }catch(e){setAnalyseMsg('❌ '+e.message);}
    setAnalyseDeploying(false);
  }

  return <div>
    {/* Analyse Deploy Section */}
    <div className="sec" style={{marginBottom:20}}>
      <div className="sec-hdr">Analyse deployen</div>
      <div style={{padding:'16px 20px'}}>
        <p style={{fontSize:13,color:'var(--mut)',marginBottom:12}}>Nach einer fertigen Aktienanalyse: JSON-Block aus dem Chat kopieren und hier einfügen. Aktualisiert die Kerndaten in JSONBin ohne bestehende Events zu überschreiben.</p>
        <div style={{marginBottom:10}}>
          <label>JSON aus Analyse-Chat einfügen</label>
          <textarea value={analysePaste} onChange={function(e){setAnalysePaste(e.target.value);}} placeholder={'{ "ticker": "AAPL", "name": "...", "scores": {...}, "rating": "KAUFEN", ... }'} style={{height:140,resize:'vertical',fontFamily:'monospace',fontSize:12}}/>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
          <button className="btn btn-pri" onClick={deployAnalyse} disabled={!analysePaste.trim()||analyseDeploying}>
            {analyseDeploying?'Wird deployed...':'Analyse deployen'}
          </button>
          {analysePaste&&<button className="btn" onClick={function(){setAnalysePaste('');setAnalyseMsg('');}}>Leeren</button>}
        </div>
        {analyseMsg&&<div style={{marginTop:10,fontSize:13,color:analyseMsg.startsWith('✅')?'var(--grn)':'var(--red)',background:analyseMsg.startsWith('✅')?'#ECFDF5':'#FEF2F2',border:'1px solid '+(analyseMsg.startsWith('✅')?'#A7F3D0':'#FECACA'),borderRadius:8,padding:'8px 12px'}}>{analyseMsg}</div>}
      </div>
    </div>

    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:8}}>
      <span style={{fontSize:13,color:'var(--mut)'}}>{companies.length} Analysen</span>
      <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
        <button className="btn" onClick={onReset} style={{fontSize:11}}>Seed-Daten</button>
        <button className="btn btn-blu" onClick={onSync} disabled={syncing}>{syncing?'Lade...':'Von JSONBin laden'}</button>
        <button className="btn btn-grn" onClick={onPush} disabled={syncing}>{syncing?'...':'Lokal nach JSONBin'}</button>
        <button className="btn btn-pri" onClick={onAdd}>+ Manuell</button>
      </div>
    </div>
    {companies.length===0?<div className="empty">Keine Analysen.</div>:<div className="co-list">{companies.map(c=>{
      const sc=avg(c.scores);
      return <div key={c.id} className="co-row">
        <div className="co-info">
          <div style={{width:42,height:42,borderRadius:'50%',background:'#EFF6FF',border:'1px solid #BFDBFE',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:13,color:'var(--pri)',flexShrink:0}}>{sc}</div>
          <div><div className="co-name">{c.name}</div><div style={{display:'flex',gap:6,flexWrap:'wrap',marginTop:2}}><span className="co-tick">{c.ticker} · {c.exchange}</span><span className={BGC[c.rating]||'badge'} style={{fontSize:10}}>{c.rating}</span></div></div>
          <div style={{fontSize:12,color:'var(--mut)'}}>{c.zielkurs} · {c.upside}</div>
        </div>
        <div className="co-btns">
          {c.analyseUrl&&<a href={c.analyseUrl} target="_blank" rel="noopener" className="lbtn lbtn-a" style={{fontSize:11}}>Analyse</a>}
          {c.chatUrl&&<a href={c.chatUrl} target="_blank" rel="noopener" className="lbtn lbtn-c" style={{fontSize:11}}>Chat</a>}
          <button className="btn" onClick={()=>onEdit(c)}>Edit</button>
          <button className="btn btn-red" onClick={()=>onDelete(c.id)}>X</button>
        </div>
      </div>
    })}</div>}
  </div>
}

function Toast({msg,err,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,2400);return()=>clearTimeout(t)},[]);
  return <div className={'toast'+(err?' toast-err':'')}>{err?'Fehler: ':''}{msg}</div>
}

function App(){
  const [cos,setCos]=useState([]);
  const [loaded,setLoaded]=useState(false);
  const [tab,setTab]=useState('overview');
  const [modal,setModal]=useState(null);
  const [toast,setToast]=useState(null);
  const [syncing,setSyncing]=useState(false);
  const [syncStatus,setSyncStatus]=useState('idle');
  const [newsCache,setNewsCache]=useState([]);
  const [newsCacheUpdatedAt,setNewsCacheUpdatedAt]=useState('');

  useEffect(()=>{
    async function init(){
      let data=[];
      try{const r=localStorage.getItem(SK);data=r?JSON.parse(r):SEED;}catch(e){data=SEED;}
      setSyncStatus('spin');
      try{
        const r1=await fetch('https://api.jsonbin.io/v3/b/'+JSONBIN_ID+'/latest',{headers:{'X-Master-Key':JSONBIN_KEY,'X-Bin-Meta':'false'}});
        if(r1.ok){const d=await r1.json();
          if(d.companies&&d.companies.length>0){data=d.companies;}
          if(d.newsCache&&Array.isArray(d.newsCache)&&d.newsCache.length>0){setNewsCache(d.newsCache);setNewsCacheUpdatedAt(d.newsCacheUpdatedAt||'');}
        }
        setSyncStatus('ok');
      }catch(e){setSyncStatus('err');}
      setCos(data);
      setLoaded(true);
    }
    init();
  },[]);

  useEffect(()=>{if(!loaded)return;try{localStorage.setItem(SK,JSON.stringify(cos));}catch(e){}},[cos,loaded]);

  const save=(co)=>{setCos(p=>p.some(c=>c.id===co.id)?p.map(c=>c.id===co.id?co:c):[...p,co]);setModal(null);setToast({msg:co.name+' gespeichert'});};
  const del=(id)=>{const co=cos.find(c=>c.id===id);if(window.confirm(co?co.name+' löschen?':'Löschen?')){setCos(p=>p.filter(c=>c.id!==id));setToast({msg:'Gelöscht'});}};
  const reset=()=>{if(window.confirm('Auf Seed-Daten zurücksetzen?')){setCos(SEED);setToast({msg:'Zurückgesetzt'});}};

  const syncFromJSONBin=async()=>{
    setSyncing(true);
    try{
      const r1=await fetch('https://api.jsonbin.io/v3/b/'+JSONBIN_ID+'/latest',{headers:{'X-Master-Key':JSONBIN_KEY,'X-Bin-Meta':'false'}});
      if(!r1.ok) throw new Error('HTTP '+r1.status);
      const d=await r1.json();
      if(d.companies&&Array.isArray(d.companies)){setCos(d.companies);localStorage.setItem(SK,JSON.stringify(d.companies));setToast({msg:d.companies.length+' Analysen geladen'});setSyncStatus('ok');}
      if(d.newsCache&&Array.isArray(d.newsCache)&&d.newsCache.length>0){setNewsCache(d.newsCache);setNewsCacheUpdatedAt(d.newsCacheUpdatedAt||'');}
    }catch(e){setToast({msg:'Sync fehlgeschlagen: '+e.message,err:true});setSyncStatus('err');}
    setSyncing(false);
  };

  const pushToJSONBin=async()=>{
    setSyncing(true);
    try{
      const r=await fetch('https://api.jsonbin.io/v3/b/'+JSONBIN_ID,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':JSONBIN_KEY},body:JSON.stringify({companies:cos,newsCache:newsCache,newsCacheUpdatedAt:newsCacheUpdatedAt||'',updatedAt:new Date().toISOString()})});
      if(!r.ok) throw new Error('HTTP '+r.status);
      setToast({msg:cos.length+' Analysen nach JSONBin gepusht'});setSyncStatus('ok');
    }catch(e){setToast({msg:'Push fehlgeschlagen: '+e.message,err:true});setSyncStatus('err');}
    setSyncing(false);
  };

  const buys=cos.filter(c=>c.rating==='KAUFEN').length;
  const avgSc=cos.length?Math.round(cos.reduce((a,c)=>a+avg(c.scores),0)/cos.length*10)/10:0;
  const allEvts=cos.flatMap(c=>c.events.filter(e=>e.title)).length;

  return <>
    <div className="hdr">
      <div>
        <h1>Portfolio <span>Aktienanalysen</span></h1>
        <div className="hdr-sub">
          Aktienanalyse Canvas v2.2
          <span className={'sync-dot '+(syncStatus==='spin'?'spin':syncStatus==='ok'?'ok':'err')}></span>
          <span style={{fontSize:11}}>{syncStatus==='spin'?'Sync...':syncStatus==='ok'?'JSONBin verbunden':'Offline'}</span>
        </div>
      </div>
      <div className="hdr-stats">
        <div className="hs"><div className="hs-v">{cos.length}</div><div className="hs-l">Analysen</div></div>
        <div className="hs"><div className="hs-v" style={{color:'var(--grn)'}}>{buys}x</div><div className="hs-l">Kaufen</div></div>
        <div className="hs"><div className="hs-v">{avgSc}</div><div className="hs-l">Score</div></div>
        <div className="hs"><div className="hs-v">{allEvts}</div><div className="hs-l">Events</div></div>
      </div>
    </div>
    <div className="tabs">
      <button className={'tab'+(tab==='overview'?' active':'')} onClick={()=>setTab('overview')}>Übersicht</button>
      <button className={'tab'+(tab==='feed'?' active':'')} onClick={()=>setTab('feed')}>Events</button>
      <button className={'tab'+(tab==='news'?' active':'')} onClick={()=>setTab('news')}>News Scan</button>
      <button className={'tab'+(tab==='manage'?' active':'')} onClick={()=>setTab('manage')}>Verwalten</button>
      <button className={'tab'+(tab==='make'?' active':'')} onClick={()=>setTab('make')}>Make.com</button>
    </div>
    <div className="main">
      {tab==='overview'&&<OverviewTab companies={cos}/>}
      {tab==='feed'&&<FeedTab companies={cos} newsCache={newsCache}/>}
      {tab==='news'&&<NewsTab companies={cos} newsCache={newsCache} onNewsUpdate={function(nc){setNewsCache(nc);setNewsCacheUpdatedAt(new Date().toISOString());}}/>}
      {tab==='manage'&&<ManageTab companies={cos} onAdd={()=>setModal(blankCo())} onEdit={c=>setModal(JSON.parse(JSON.stringify(c)))} onDelete={del} onReset={reset} onSync={syncFromJSONBin} onPush={pushToJSONBin} syncing={syncing}/>}
      {tab==='make'&&<MakeTab/>}
    </div>
    {modal&&<ModalForm co={modal} onSave={save} onClose={()=>setModal(null)}/>}
    {toast&&<Toast msg={toast.msg} err={toast.err} onDone={()=>setToast(null)}/>}
  </>
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
