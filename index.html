const WC={up:'#22c55e',down:'#ef4444',neutral:'#f59e0b'};
const BGC={KAUFEN:'badge pill-g',HALTEN:'badge pill-y',VERKAUFEN:'badge pill-r'};

function avg(sc){return Math.round(Object.values(sc).reduce((a,b)=>a+b,0)/Object.values(sc).length*10)/10}
function blankCo(){return{id:'co_'+Date.now(),ticker:'',name:'',exchange:'',sector:'',price:'',priceDate:'',w52:'',scores:{gm:5,bg:5,qu:5,wa:5,bw:5,cf:5,ri:5,ta:5},rating:'KAUFEN',zielkurs:'',upside:'',downside:'',rr:'',horizont:'',badges:[],chatUrl:'',analyseUrl:'',events:[{id:'e1',title:'',date:'',dateSort:'',priority:'high',desc:'',wd:[]},{id:'e2',title:'',date:'',dateSort:'',priority:'med',desc:'',wd:[]},{id:'e3',title:'',date:'',dateSort:'',priority:'blue',desc:'',wd:[]}]}}

function ScoreBar({val}){
  return <div className="sb"><div className="sb-track"><div className="sb-fill" style={{width:Math.round(val*10)+'%'}}></div></div><span className="sb-num">{val}</span></div>
}

function PortfolioCard({co}){
  const sc=avg(co.scores);
  const rc=RC[co.rating]||'#888';
  const p7=co.perf7d!=null?co.perf7d:null;
  const p1m=co.perf1m!=null?co.perf1m:null;
  return <div className="pcard">
    <div className="pcard-hdr">
      <div><div className="pcard-name">{co.name}</div><div className="pcard-tick">{co.ticker} · {co.exchange} · {co.sector}</div></div>
      <div style={{textAlign:'right'}}><div className="pcard-price">{co.currentPrice||co.price}</div><div className="pcard-pm">{co.priceUpdatedAt?new Date(co.priceUpdatedAt).toLocaleDateString('de-DE'):co.priceDate}</div></div>
    </div>
    <div className="pcard-body">
      <div style={{fontSize:11,color:'var(--dim)',textTransform:'uppercase',letterSpacing:'.4px',marginBottom:4}}>Oe Score</div>
      <ScoreBar val={sc}/>
      <div className="pills">{Object.entries(co.scores).map(function([k,v]){return <span key={k} className={'pill '+(v>=8?'pill-g':v>=6?'pill-y':'pill-r')}>{SL[k].split(' ')[0]} {v}</span>})}</div>
      <div className="drow">
        <div className="di"><span className="di-l">Rating</span><span className="di-v" style={{color:rc}}>{co.rating==='KAUFEN'?'Kaufen':co.rating==='HALTEN'?'Halten':'Verkaufen'}</span></div>
        <div className="di"><span className="di-l">Upside</span><span className="di-v g">{co.upside}</span></div>
        <div className="di"><span className="di-l">Downside</span><span className="di-v r">{co.downside}</span></div>
        <div className="di"><span className="di-l">7T</span><span className="di-v" style={{color:p7==null?'var(--dim)':p7>=0?'var(--grn)':'var(--red)'}}>{p7==null?'--':((p7>=0?'+':'')+p7.toFixed(1)+'%')}</span></div>
        <div className="di"><span className="di-l">1M</span><span className="di-v" style={{color:p1m==null?'var(--dim)':p1m>=0?'var(--grn)':'var(--red)'}}>{p1m==null?'--':((p1m>=0?'+':'')+p1m.toFixed(1)+'%')}</span></div>
      </div>
      {co.events.filter(e=>e.title).length>0&&<div className="evts"><div className="evt-t">Naechste Events</div>{co.events.filter(e=>e.title).map(e=><div key={e.id} className="evt-i"><div className="edot" style={{background:PC[e.priority]||'#888'}}></div><span>{e.date} - {e.title}</span></div>)}</div>}
    </div>
    <div className="pcard-foot">
      <div className="badges">{co.badges.map((b,i)=><span key={i} className="badge pill-o">{b}</span>)}</div>
      <div className="lnks">
        {co.analyseUrl&&<a href={co.analyseUrl} target="_blank" rel="noopener" className="lbtn lbtn-a">Analyse</a>}
        {co.chatUrl&&<a href={co.chatUrl} target="_blank" rel="noopener" className="lbtn lbtn-c">Chat</a>}
      </div>
    </div>
  </div>
}

function EventItem({ev,co}){
  const pc=PC[ev.priority]||'#888';
  const cls={high:'tl-item tl-h',med:'tl-item tl-m',blue:'tl-item tl-b',low:'tl-item tl-l'}[ev.priority]||'tl-item tl-b';
  const bc=ev.priority==='high'?'239,68,68':ev.priority==='med'?'245,158,11':'59,130,246';
  return <div className={cls}>
    <div className="tl-dot-col"><div className="tl-dot" style={{background:pc}}></div></div>
    <div className="tl-body">
      <div className="tl-top">
        <div className="tl-title">{co.name} – {ev.title}</div>
        <div className="tl-meta">
          <span className="tl-date">{ev.date}</span>
          <span className="badge pill-o" style={{fontSize:10}}>{co.ticker}</span>
          <span className="badge" style={{fontSize:10,background:'rgba('+bc+',.12)',color:pc,border:'1px solid rgba('+bc+',.2)'}}>{ev.priority==='high'?'High':ev.priority==='med'?'Medium':'Strukturell'}</span>
        </div>
      </div>
      {ev.desc&&<div className="tl-desc">{ev.desc}</div>}
      {ev.wd.length>0&&<div className="tl-wd">{ev.wd.map((w,i)=><div key={i} className="wd-row"><span className="wd-ico" style={{color:WC[w.t]}}>{WI[w.t]}</span><span>{w.text}</span></div>)}</div>}
      <div className="tl-lnks">
        {co.analyseUrl&&<a href={co.analyseUrl} target="_blank" rel="noopener" className="lbtn lbtn-a">Analyse</a>}
        {co.chatUrl&&<a href={co.chatUrl} target="_blank" rel="noopener" className="lbtn lbtn-c">Chat</a>}
      </div>
    </div>
  </div>
}

function SortTh({label,col,sort,setSort}){
  const active=sort.col===col;
  const arrow=active?(sort.dir==='asc'?'▲':'▼'):'⇅';
  return <th style={{cursor:'pointer',userSelect:'none',whiteSpace:'nowrap'}} onClick={()=>setSort(s=>s.col===col?{col,dir:s.dir==='asc'?'desc':'asc'}:{col,dir:'asc'})}>
    {label} <span style={{opacity:active?1:.35,fontSize:9}}>{arrow}</span>
  </th>
}

function OverviewTab({companies}){
  const [sort,setSort]=useState({col:'score',dir:'desc'});
  const total=companies.length;
  const avgSc=total?Math.round(companies.reduce((a,c)=>a+avg(c.scores),0)/total*10)/10:0;
  const buys=companies.filter(c=>c.rating==='KAUFEN').length;
  const allEvts=companies.flatMap(c=>c.events.filter(e=>e.title&&e.dateSort)).sort((a,b)=>a.dateSort>b.dateSort?1:-1);
  const nextEvt=allEvts[0];
  const nextCo=nextEvt?companies.find(c=>c.events.some(e=>e.id===nextEvt.id)):null;
  if(!total) return <div className="empty">Noch keine Analysen vorhanden.</div>;

  const sorted=[...companies].sort((a,b)=>{
    let av,bv;
    if(sort.col==='name'){av=a.name;bv=b.name;}
    else if(sort.col==='score'){av=avg(a.scores);bv=avg(b.scores);}
    else if(sort.col==='ta'){av=a.scores.ta;bv=b.scores.ta;}
    else if(sort.col==='rating'){
      const RM={KAUFEN:0,HALTEN:1,VERKAUFEN:2};
      av=RM[a.rating]!=null?RM[a.rating]:3;
      bv=RM[b.rating]!=null?RM[b.rating]:3;
    }
    else if(sort.col==='upside'){av=parseFloat((a.upside||'').replace(/[^0-9.-]/g,''))||0;bv=parseFloat((b.upside||'').replace(/[^0-9.-]/g,''))||0;}
    else if(sort.col==='downside'){av=parseFloat((a.downside||'').replace(/[^0-9.-]/g,''))||0;bv=parseFloat((b.downside||'').replace(/[^0-9.-]/g,''))||0;}
    else if(sort.col==='perf7d'||sort.col==='perf1m'||sort.col==='perfAnalysis'){
      av=a[sort.col]!=null?a[sort.col]:null;
      bv=b[sort.col]!=null?b[sort.col]:null;
      if(av===null&&bv===null) return 0;
      if(av===null) return 1;
      if(bv===null) return -1;
    }
    else{av=a[sort.col]||'';bv=b[sort.col]||'';}
    if(typeof av==='string') return sort.dir==='asc'?av.localeCompare(bv):bv.localeCompare(av);
    return sort.dir==='asc'?av-bv:bv-av;
  });

  return <div>
    <div className="kpi-grid">
      <div className="kpi"><div className="kpi-l">Analysen</div><div className="kpi-v" style={{color:'var(--pri)'}}>{total}</div><div className="kpi-s">Canvas v2.2</div></div>
      <div className="kpi"><div className="kpi-l">Ø Score</div><div className="kpi-v" style={{color:'var(--pri)'}}>{avgSc}/10</div></div>
      <div className="kpi"><div className="kpi-l">Ratings</div><div className="kpi-v" style={{color:'var(--grn)'}}>{buys}x Kaufen</div><div className="kpi-s">{companies.filter(c=>c.rating==='HALTEN').length}x Halten · {companies.filter(c=>c.rating==='VERKAUFEN').length}x Verkaufen</div></div>
      <div className="kpi"><div className="kpi-l">Nächster Event</div><div className="kpi-v" style={{color:'var(--blu)',fontSize:14}}>{nextEvt?nextEvt.date:'–'}</div><div className="kpi-s">{nextCo?nextCo.ticker:''}{nextEvt?' · '+nextEvt.title.slice(0,18)+'…':''}</div></div>
      <div className="kpi"><div className="kpi-l">Technisch bullisch</div><div className="kpi-v" style={{color:'var(--yel)'}}>{companies.filter(c=>c.scores.ta>=7).length}x</div><div className="kpi-s">{companies.filter(c=>c.scores.ta<5).length}x bärisch</div></div>
      <div className="kpi"><div className="kpi-l">Events</div><div className="kpi-v" style={{color:'var(--pri)'}}>{allEvts.length}</div><div className="kpi-s">Upcoming</div></div>
    </div>
    <div className="sec" style={{marginBottom:24}}>
      <div className="sec-hdr">Vergleichsübersicht</div>
      <div className="tbl-wrap"><table>
        <thead><tr>
          <SortTh label="Unternehmen" col="name" sort={sort} setSort={setSort}/>
          <SortTh label="Score" col="score" sort={sort} setSort={setSort}/>
          <SortTh label="Rating" col="rating" sort={sort} setSort={setSort}/>
          <SortTh label="Technisch" col="ta" sort={sort} setSort={setSort}/>
          <th>Analyse</th>
          <SortTh label="Perf. seit Analyse" col="perfAnalysis" sort={sort} setSort={setSort}/>
          <SortTh label="Upside" col="upside" sort={sort} setSort={setSort}/>
          <SortTh label="Downside" col="downside" sort={sort} setSort={setSort}/>
          <SortTh label="7T" col="perf7d" sort={sort} setSort={setSort}/>
          <SortTh label="1M" col="perf1m" sort={sort} setSort={setSort}/>
          <th>Links</th>
        </tr></thead>
        <tbody>{sorted.map(c=>{
          const sc=avg(c.scores);
          const ta=c.scores.ta||0;
          const taColor=ta>=7?'var(--grn)':ta>=5?'var(--yel)':'var(--red)';
          const p7=c.perf7d!=null?c.perf7d:null;
          const p1m=c.perf1m!=null?c.perf1m:null;
          const parseP=s=>{if(!s)return null;const m=(s||'').replace(/,/g,'.').match(/[\d]+(?:\.\d+)?/);return m?parseFloat(m[0]):null;};
          const ap=parseP(c.price);
          const cp=parseP(c.currentPrice);
          let perfSinceEl=<span style={{color:'var(--dim)',fontSize:10}}>–</span>;
          if(ap&&cp&&ap!==cp){
            const pa=Math.round(((cp-ap)/ap)*1000)/10;
            if(Math.abs(pa)<=200) perfSinceEl=<span style={{fontWeight:600,fontSize:12,color:pa>=0?'var(--grn)':'var(--red)'}}>{pa>=0?'+':''}{pa.toFixed(1)}%</span>;
          }
          return <tr key={c.id}>
            <td><strong>{c.name}</strong><br/><span style={{color:'var(--dim)',fontSize:10}}>{c.ticker} · {c.exchange}</span></td>
            <td><span style={{color:'var(--pri)',fontWeight:700}}>{sc}</span></td>
            <td><span className={BGC[c.rating]||'badge'} style={{fontSize:11}}>{c.rating}</span></td>
            <td><span style={{color:taColor,fontWeight:700}}>{ta}/10</span></td>
            <td style={{fontSize:11,color:'var(--mut)'}}>{c.priceDate||'–'}</td>
            <td>{perfSinceEl}</td>
            <td style={{color:'var(--grn)',fontWeight:600,fontSize:12}}>{c.upside}</td>
            <td style={{color:'var(--red)',fontWeight:600,fontSize:12}}>{c.downside}</td>
            <td style={{fontWeight:600,fontSize:12,color:p7==null?'var(--dim)':p7>=0?'var(--grn)':'var(--red)'}}>
              {p7==null?<span style={{color:'var(--dim)',fontSize:10}}>–</span>:(p7>=0?'+':'')+p7.toFixed(1)+'%'}
            </td>
            <td style={{fontWeight:600,fontSize:12,color:p1m==null?'var(--dim)':p1m>=0?'var(--grn)':'var(--red)'}}>
              {p1m==null?<span style={{color:'var(--dim)',fontSize:10}}>–</span>:(p1m>=0?'+':'')+p1m.toFixed(1)+'%'}
            </td>
            <td style={{whiteSpace:'nowrap'}}>
              {c.analyseUrl&&<a href={c.analyseUrl} target="_blank" rel="noopener" className="lbtn lbtn-a" style={{fontSize:10,marginRight:3}}>Analyse</a>}
              {c.chatUrl&&<a href={c.chatUrl} target="_blank" rel="noopener" className="lbtn lbtn-c" style={{fontSize:10}}>Chat</a>}
            </td>
          </tr>
        })}</tbody>
      </table></div>
    </div>
    <div className="grid3">{companies.map(c=><PortfolioCard key={c.id} co={c}/>)}</div>
    <div className="disc">Disclaimer: Diese Übersicht dient ausschließlich zu Informationszwecken. Keine Anlageberatung. Aktienanalyse Canvas v2.2 | Stand: März 2026.</div>
  </div>
}

function EventsTab({companies,newsCache}){
  const [view,setView]=useState('upcoming');
  const [filter,setFilter]=useState('all');
  const today=new Date(); today.setHours(0,0,0,0);

  // For each event, find matching newsCache entry (per eventId)
  function getMatch(co,ev){
    if(!newsCache||!newsCache.length) return null;
    if(!co||!ev) return null;
    // New format: per eventId
    var m=newsCache.find(function(n){return n.ticker===co.ticker&&n.eventId===ev.id;});
    if(m) return m;
    // Legacy fallback: attach to the highest-priority event for this ticker
    var legacy=newsCache.find(function(n){return n.ticker===co.ticker&&!n.eventId;});
    if(!legacy) return null;
    // Find the best event to attach to: first high priority, else first by dateSort
    var evts=(co.events||[]).filter(function(e){return e.title&&e.dateSort;});
    evts.sort(function(a,b){
      var pa={high:0,med:1,blue:2,low:3}[a.priority]||1;
      var pb={high:0,med:1,blue:2,low:3}[b.priority]||1;
      if(pa!==pb) return pa-pb;
      return a.dateSort>b.dateSort?1:-1;
    });
    return (evts[0]&&evts[0].id===ev.id)?legacy:null;
  }

  var allEvts=companies.flatMap(function(co){
    return co.events.filter(function(e){return e.title&&e.dateSort;}).map(function(e){
      var d=new Date(e.dateSort);
      var overdue=!isNaN(d.getTime())&&d<today;
      var match=getMatch(co,e);
      return Object.assign({},e,{coId:co.id,overdue:overdue,match:match});
    });
  }).sort(function(a,b){return a.dateSort>b.dateSort?1:-1;});

  var upcomingEvts=allEvts.filter(function(e){return !e.overdue;});
  var overdueEvts=allEvts.filter(function(e){return e.overdue&&!e.match;});
  var historyEvts=allEvts.filter(function(e){return !!e.match;});

  var displayed=view==='upcoming'?upcomingEvts:view==='overdue'?overdueEvts:historyEvts;
  var visible=filter==='all'?displayed:displayed.filter(function(e){return e.coId===filter;});
  var months=[...new Set(visible.map(function(e){var d=new Date(e.dateSort);return isNaN(d.getTime())?(e.dateSort||'TBD'):d.toLocaleDateString('de-DE',{month:'long',year:'numeric'});}))];

  var aIcon=function(a){return a==='gruen'?'🟢':a==='gelb'?'🟡':'🔴';};
  var aColor=function(a){return a==='gruen'?'var(--grn)':a==='gelb'?'var(--yel)':'var(--red)';};

  function launchAllOverdueSearch(){
    var evList=overdueEvts.map(function(e){
      var co=companies.find(function(c){return c.id===e.coId;});
      return co?co.ticker+' | Event: '+e.title+' (erwartet: '+e.date+')':'';
    }).filter(Boolean).join('\n');
    var prompt='Overdue Event News-Recherche fuer '+overdueEvts.length+' ueberfaellige Investment-Events:\n\n'+evList+'\n\nBitte suche gezielt nach News die zeigen ob diese Events eingetreten sind oder relevante Updates gibt. Nur Events mit wirklich passenden News aufnehmen. Antworte mit JSON-Array (kein Markdown):\n[{"ticker":"...","eventId":"...","ampel":"gruen","headline":"1 Satz","news":[{"title":"...","date":"TT.MM.JJJJ","url":"https://..."}],"searchedAt":"JJJJ-MM-TT"}]\n\nWICHTIG: Am Ende den kompletten newsCache als JSON-Block ausgeben (```json [...] ```) damit er in die Portfolio-App kopiert werden kann. KEIN Artifact, KEIN Download.';
    window.open('https://claude.ai/new?q='+encodeURIComponent(prompt),'_blank');
  }

  function NewsBlock({match}){
    if(!match||!match.news||!match.news.length) return null;
    return <div style={{marginTop:8,background:'rgba(0,0,0,.25)',borderRadius:6,overflow:'hidden'}}>
      {match.news.map(function(n,j){
        return <div key={j} style={{padding:'6px 10px',borderBottom:j<match.news.length-1?'1px solid rgba(46,46,56,.4)':'none',display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8}}>
          <div style={{flex:1}}>
            {n.url?<a href={n.url} target="_blank" rel="noopener" style={{color:'var(--txt)',fontSize:11,lineHeight:1.4,textDecoration:'underline',textDecorationColor:'rgba(255,255,255,.2)'}}>{n.title}</a>:<span style={{color:'var(--txt)',fontSize:11}}>{n.title}</span>}
          </div>
          {n.date&&<span style={{fontSize:11,color:'var(--mut)',flexShrink:0,marginTop:1,whiteSpace:'nowrap'}}>{n.date}</span>}
        </div>;
      })}
    </div>;
  }

  return <div>
    <div style={{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap'}}>
      <button className={'chip'+(view==='upcoming'?' active':'')} onClick={()=>setView('upcoming')}>Upcoming ({upcomingEvts.length})</button>
      <button className={'chip'+(view==='overdue'?' active':'')} onClick={()=>setView('overdue')} style={overdueEvts.length>0?{borderColor:'var(--red)',color:'var(--red)'}:{}}>Overdue ({overdueEvts.length})</button>
      <button className={'chip'+(view==='history'?' active':'')} onClick={()=>setView('history')} style={historyEvts.length>0?{borderColor:'var(--grn)',color:'var(--grn)'}:{}}>History ({historyEvts.length})</button>
    </div>
    <div className="chips">
      <span style={{fontSize:11,color:'var(--dim)',marginRight:4}}>Aktie:</span>
      <button className={'chip'+(filter==='all'?' active':'')} onClick={()=>setFilter('all')}>Alle</button>
      {companies.map(function(co){return <button key={co.id} className={'chip'+(filter===co.id?' active':'')} onClick={()=>setFilter(co.id)}>{co.ticker}</button>;})}
    </div>
    {view==='overdue'&&overdueEvts.length>0&&<div style={{marginBottom:16}}>
      <button className="btn btn-pri" onClick={launchAllOverdueSearch}>Suche News fuer alle {overdueEvts.length} Overdue Events ↗</button>
    </div>}
    {visible.length===0?<div className="empty">Keine Events in dieser Ansicht.</div>:months.map(function(g){
      var items=visible.filter(function(e){var d=new Date(e.dateSort);return(isNaN(d.getTime())?(e.dateSort||'TBD'):d.toLocaleDateString('de-DE',{month:'long',year:'numeric'}))===g;});
      if(!items.length) return null;
      var icon=view==='overdue'?'⏰':view==='history'?'✓':'📅';
      return <div key={g}>
        <div className="tl-mon">{icon} {g}</div>
        {items.map(function(e){
          var co=companies.find(function(c){return c.id===e.coId;});
          if(!co) return null;
          var pc=({high:'#ef4444',med:'#f59e0b',blue:'#3b82f6',low:'#22c55e'})[e.priority]||'#888';
          var cls=({high:'tl-item tl-h',med:'tl-item tl-m',blue:'tl-item tl-b',low:'tl-item tl-l'})[e.priority]||'tl-item tl-b';
          var bc=e.priority==='high'?'239,68,68':e.priority==='med'?'245,158,11':'59,130,246';
          return <div key={e.id+co.id}>
            <div className={cls} style={view==='overdue'?{borderLeft:'3px solid var(--red)'}:view==='history'?{borderLeft:'3px solid var(--grn)'}:{}}>
              <div className="tl-dot-col"><div className="tl-dot" style={{background:view==='overdue'?'var(--red)':view==='history'?'var(--grn)':pc}}></div></div>
              <div className="tl-body">
                <div className="tl-top">
                  <div className="tl-title">{co.name} – {e.title}</div>
                  <div className="tl-meta">
                    <span className="tl-date">{e.date}</span>
                    <span className="badge pill-o" style={{fontSize:10}}>{co.ticker}</span>
                    <span className="badge" style={{fontSize:10,background:'rgba('+bc+',.12)',color:pc,border:'1px solid rgba('+bc+',.2)'}}>{e.priority==='high'?'High':e.priority==='med'?'Medium':'Strukturell'}</span>
                    {view==='overdue'&&<span style={{fontSize:10,background:'rgba(239,68,68,.15)',color:'var(--red)',borderRadius:4,padding:'1px 6px',fontWeight:600}}>OVERDUE</span>}
                    {view==='history'&&e.match&&<span style={{fontSize:10,color:aColor(e.match.ampel)}}>{aIcon(e.match.ampel)}</span>}
                  </div>
                </div>
                {e.desc&&<div className="tl-desc">{e.desc}</div>}
                {e.wd.length>0&&<div className="tl-wd">{e.wd.map(function(w,i){return <div key={i} className="wd-row"><span className="wd-ico" style={{color:({up:'#22c55e',down:'#ef4444',neutral:'#f59e0b'})[w.t]}}>{{up:'▲',down:'▼',neutral:'→'}[w.t]}</span><span>{w.text}</span></div>;})}</div>}
                {(view==='upcoming'||view==='history')&&e.match&&<div style={{marginTop:8}}>
                  <div style={{fontSize:11,fontWeight:600,color:aColor(e.match.ampel),marginBottom:4}}>{aIcon(e.match.ampel)} {e.match.headline}</div>
                  <NewsBlock match={e.match}/>
                </div>}
                {view==='overdue'&&e.match&&e.match.searchedAt&&!e.match.news&&<div style={{fontSize:11,color:'var(--dim)',marginTop:6}}>Letzte Suche: {e.match.searchedAt} — keine relevanten News gefunden</div>}
                <div className="tl-lnks">
                  {co.analyseUrl&&<a href={co.analyseUrl} target="_blank" rel="noopener" className="lbtn lbtn-a">Analyse</a>}
                  {co.chatUrl&&<a href={co.chatUrl} target="_blank" rel="noopener" className="lbtn lbtn-c">Chat</a>}
                </div>
              </div>
            </div>
          </div>;
        })}
      </div>;
    })}
  </div>;
}


function NewsTab({companies,newsCache:newsCacheProp}){
  const [status,setStatus]=useState('loading');
  const [cache,setCache]=useState([]);
  const [timestamp,setTimestamp]=useState('');
  const [ampelFilter,setAmpelFilter]=useState('all');

  useEffect(()=>{loadCache();},[]);

  async function loadCache(){
    setStatus('loading');
    try{
      const r=await fetch('https://api.jsonbin.io/v3/b/'+JSONBIN_ID+'/latest',{headers:{'X-Master-Key':JSONBIN_KEY,'X-Bin-Meta':'false'}});
    const gd=await r.json();
    const nc=(gd&&gd.newsCache&&gd.newsCache.length>0)?gd.newsCache:(newsCacheProp&&newsCacheProp.length>0?newsCacheProp:[]);
    const d={newsCache:nc,newsCacheUpdatedAt:(gd&&gd.newsCacheUpdatedAt)||''};
      setCache(d.newsCache||[]);
      setTimestamp(d.newsCacheUpdatedAt||'');
      setStatus((d.newsCache&&d.newsCache.length>0)?'done':'empty');
    }catch(e){setStatus('error');}
  }

  function launchUpdate(){
    const tickers=companies.map(c=>c.ticker).filter(Boolean).sort().join(', ');
    const deployNote='\n\nWICHTIG - Output Format: Gib am Ende ein JSX React Artifact aus mit einem Deploy-Button der per fetch() PUT die newsCache-Daten direkt in JSONBin schreibt (ID=69b68c14aa77b81da9e78b7e, Key=$2a$10$ehBtWQSMp.KI0cqlW569/OT9CjP9tSioF3M3edlZXSC1XiV3vI7Z2). Der Button soll: 1) GET JSONBin um companies[] zu laden, 2) PUT mit {companies, newsCache, newsCacheUpdatedAt} schreiben. Format newsCache: [{ticker, ampel(gruen/gelb/rot), headline, eventMatch, news:[{title,url}]}]. KEIN curl-Befehl, KEIN JSON-Download - NUR das JSX Artifact mit Button.';
    const prompt='News Update fuer alle '+companies.length+' Portfolio-Aktien ('+new Date().toLocaleDateString('de-DE')+'):\n\n'+tickers+'\n\nBitte fuer jeden Ticker die wichtigsten News der letzten 7 Tage via Web-Recherche suchen und mit den anstehenden Investment-Events abgleichen. Ampel-Bewertung gruen/gelb/rot pro Aktie.'+deployNote;
    window.open('https://claude.ai/new?q='+encodeURIComponent(prompt),'_blank');
  }

  const aIcon=a=>a==='gruen'?'🟢':a==='gelb'?'🟡':'🔴\n\nWICHTIG: Am Ende den kompletten newsCache als JSON-Block ausgeben (```json [...] ```) damit er in die Portfolio-App kopiert werden kann. KEIN Artifact, KEIN Download.';
  const aLabel=a=>a==='gruen'?'Positiv':a==='gelb'?'Neutral':'Risiko';
  const aColor=a=>a==='gruen'?'var(--grn)':a==='gelb'?'var(--yel)':'var(--red)';

  const header=<div className="sec" style={{marginBottom:20}}>
    <div className="sec-hdr">News Scan – Alle Aktien (letzte 7 Tage)</div>
    <div style={{padding:'16px 18px'}}>
      <p style={{fontSize:13,color:'var(--mut)',marginBottom:12}}>Claude Web-Recherche für alle Portfolio-Aktien. Neuen Scan starten — Deploy-Artifact am Ende aktualisiert die Daten hier.</p>
      <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
        <button className="btn btn-pri" onClick={launchUpdate}>News Update in Claude starten ↗</button>
        <button className="btn" onClick={loadCache} style={{fontSize:12}}>Aktualisieren</button>
        <button className="btn" onClick={()=>setPasteMode(v=>!v)} style={{fontSize:12}}>Paste & Deploy</button>
      </div>
      {timestamp&&<div style={{fontSize:11,color:'var(--dim)',marginTop:8}}>Letztes Update: {new Date(timestamp).toLocaleString('de-DE')}</div>}
    </div>
  </div>;

  const [pasteMode,setPasteMode]=useState(false);
  const [pasteVal,setPasteVal]=useState('');
  const [deploying,setDeploying]=useState(false);
  const [deployMsg,setDeployMsg]=useState('');

  async function deployPasted(){
    setDeploying(true); setDeployMsg('');
    try{
      const raw=pasteVal.trim();
      const clean=raw.replace(/```json/g,'').replace(/```/g,'').trim();
      const nc=JSON.parse(clean);
      if(!Array.isArray(nc)) throw new Error('Kein Array');
      const r=await fetch('/api/deploy-news',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({newsCache:nc})});
      const d=await r.json();
      if(!d.ok) throw new Error(d.error||'Unbekannter Fehler');
      setDeployMsg('✅ '+d.count+' Einträge deployed — Seite neu laden');
      setPasteVal(''); setPasteMode(false);
      loadCache();
    }catch(e){setDeployMsg('❌ '+e.message);}
    setDeploying(false);
  }

  const pastePanel=<div style={{background:'var(--card2)',border:'1px solid var(--brd)',borderRadius:10,padding:16,marginBottom:16}}>
    <div style={{fontSize:12,fontWeight:700,color:'var(--pri)',marginBottom:10,textTransform:'uppercase',letterSpacing:.4}}>News Cache aus Claude Chat einfügen</div>
    <textarea value={pasteVal} onChange={e=>setPasteVal(e.target.value)} rows={6} placeholder={'[{"ticker":"MU","eventId":"e1","ampel":"gruen","headline":"...","news":[...]},...]'} style={{width:'100%',marginBottom:10,fontFamily:'monospace',fontSize:11}}/>
    <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
      <button className="btn btn-pri" onClick={deployPasted} disabled={deploying||!pasteVal.trim()}>{deploying?'Deploying...':'Deploy'}</button>
      <button className="btn" onClick={()=>{setPasteMode(false);setPasteVal('');setDeployMsg('');}}>Abbrechen</button>
      {deployMsg&&<span style={{fontSize:12,color:deployMsg.startsWith('✅')?'var(--grn)':'var(--red)'}}>{deployMsg}</span>}
    </div>
  </div>;

  if(status==='loading') return <div>{header}{pasteMode&&pastePanel}<div style={{color:'var(--mut)',fontSize:13,padding:'12px 0'}}>Lade News-Cache...</div></div>;
  if(status==='empty') return <div>{header}{pasteMode&&pastePanel}<div className="empty">Noch kein News-Scan. Klicke "News Update in Claude starten".</div></div>;
  if(status==='error') return <div>{header}{pasteMode&&pastePanel}<div style={{color:'var(--red)',fontSize:13}}>Fehler beim Laden.</div></div>;

  const gc=cache.filter(r=>r.ampel==='gruen').length;
  const yc=cache.filter(r=>r.ampel==='gelb').length;
  const rc=cache.filter(r=>r.ampel==='rot').length;
  const visible=ampelFilter==='all'?cache:cache.filter(r=>r.ampel===ampelFilter);

  return <div>
    {header}
    {pasteMode&&pastePanel}
    <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap'}}>
      <button className={'chip'+(ampelFilter==='all'?' active':'')} onClick={()=>setAmpelFilter('all')}>Alle ({cache.length})</button>
      <button className={'chip'+(ampelFilter==='gruen'?' active':'')} onClick={()=>setAmpelFilter('gruen')} style={ampelFilter==='gruen'?{}:{color:'var(--grn)',borderColor:'rgba(34,197,94,.3)'}}>🟢 Positiv ({gc})</button>
      <button className={'chip'+(ampelFilter==='gelb'?' active':'')} onClick={()=>setAmpelFilter('gelb')} style={ampelFilter==='gelb'?{}:{color:'var(--yel)',borderColor:'rgba(245,158,11,.3)'}}>🟡 Neutral ({yc})</button>
      <button className={'chip'+(ampelFilter==='rot'?' active':'')} onClick={()=>setAmpelFilter('rot')} style={ampelFilter==='rot'?{}:{color:'var(--red)',borderColor:'rgba(239,68,68,.3)'}}>🔴 Risiko ({rc})</button>
    </div>
    {visible.map((r,i)=>{
      const co=companies.find(c=>c.ticker===r.ticker);
      return <div key={i} className="sec" style={{marginBottom:10}}>
        <div style={{padding:'12px 16px',display:'flex',gap:12,alignItems:'flex-start'}}>
          <div style={{fontSize:18,flexShrink:0,marginTop:2}}>{aIcon(r.ampel)}</div>
          <div style={{flex:1}}>
            <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:4,flexWrap:'wrap'}}>
              <span style={{fontSize:14,fontWeight:700,color:'#fff'}}>{r.ticker}</span>
              {co&&<span style={{fontSize:11,color:'var(--pri)'}}>- {co.name}</span>}
              <span style={{fontSize:11,fontWeight:600,color:aColor(r.ampel)}}>{aLabel(r.ampel)}</span>
            </div>
            <div style={{fontSize:13,fontWeight:600,color:'var(--txt)',marginBottom:4}}>{r.headline}</div>
            <div style={{fontSize:12,color:'var(--mut)',lineHeight:1.6,marginBottom:6}}>{r.eventMatch}</div>
            {r.news&&r.news.length>0&&<div style={{marginTop:8,background:'rgba(0,0,0,.2)',borderRadius:6,overflow:'hidden'}}>
              {r.news.map((n,j)=><div key={j} style={{padding:'7px 10px',borderBottom:j<r.news.length-1?'1px solid rgba(46,46,56,.4)':'none',display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8}}>
                <div style={{flex:1}}>
                  {n.url?<a href={n.url} target="_blank" rel="noopener" style={{color:'var(--txt)',fontSize:12,lineHeight:1.4,textDecoration:'underline',textDecorationColor:'rgba(255,255,255,.2)'}}>{n.title}</a>:<span style={{color:'var(--txt)',fontSize:12,lineHeight:1.4}}>{n.title}</span>}
                </div>
                {n.date&&<span style={{fontSize:11,color:'var(--mut)',flexShrink:0,marginTop:2,whiteSpace:'nowrap'}}>{n.date}</span>}
              </div>)}
            </div>}
            <div style={{display:'flex',gap:6,marginTop:8}}>
              {co&&co.analyseUrl&&<a href={co.analyseUrl} target="_blank" rel="noopener" className="lbtn lbtn-a" style={{fontSize:10}}>Analyse</a>}
              {co&&co.chatUrl&&<a href={co.chatUrl} target="_blank" rel="noopener" className="lbtn lbtn-c" style={{fontSize:10}}>Chat</a>}
            </div>
          </div>
        </div>
      </div>;
    })}
  </div>
}

  const setScore=(k,v)=>setD(p=>({...p,scores:{...p.scores,[k]:Math.max(0,Math.min(10,parseFloat(v)||0))}}));
  const setEvt=(i,f,v)=>setD(p=>{const ev=[...p.events];ev[i]={...ev[i],[f]:v};return{...p,events:ev}});
  const addWd=(i)=>setD(p=>{const ev=[...p.events];ev[i]={...ev[i],wd:[...ev[i].wd,{t:'up',text:''}]};return{...p,events:ev}});
  const setWd=(ei,wi,f,v)=>setD(p=>{const ev=[...p.events];const wd=[...ev[ei].wd];wd[wi]={...wd[wi],[f]:v};ev[ei]={...ev[ei],wd};return{...p,events:ev}});
  const delWd=(ei,wi)=>setD(p=>{const ev=[...p.events];ev[ei]={...ev[ei],wd:ev[ei].wd.filter((_,j)=>j!==wi)};return{...p,events:ev}});

    </div>
  </div>
}

function App(){
  const [cos,setCos]=useState([]);
  const [loaded,setLoaded]=useState(false);
  const [tab,setTab]=useState('overview');
  const [modal,setModal]=useState(null);
  const [toast,setToast]=useState(null);
  const [syncing,setSyncing]=useState(false);
  const [syncStatus,setSyncStatus]=useState('idle');
  const [newsCache,setNewsCache]=useState([]);
  const [newsCacheUpdatedAt,setNewsCacheUpdatedAt]=useState('');

  useEffect(()=>{
    async function init(){
      let data=[];
      try{const r=localStorage.getItem(SK);data=r?JSON.parse(r):SEED;}catch(e){data=SEED;}
      setSyncStatus('spin');
      try{
        const r1=await fetch('https://api.jsonbin.io/v3/b/'+JSONBIN_ID+'/latest',{headers:{'X-Master-Key':JSONBIN_KEY,'X-Bin-Meta':'false'}});
        if(r1.ok){const d=await r1.json();
          if(d.companies&&d.companies.length>0){data=d.companies;}
          if(d.newsCache&&Array.isArray(d.newsCache)&&d.newsCache.length>0){setNewsCache(d.newsCache);setNewsCacheUpdatedAt(d.newsCacheUpdatedAt||'');}
        }
        setSyncStatus('ok');
      }catch(e){setSyncStatus('err');}
      setCos(data);
      setLoaded(true);
    }
    init();
  },[]);

  useEffect(()=>{if(!loaded)return;try{localStorage.setItem(SK,JSON.stringify(cos));}catch(e){}},[cos,loaded]);

  const save=(co)=>{setCos(p=>p.some(c=>c.id===co.id)?p.map(c=>c.id===co.id?co:c):[...p,co]);setModal(null);setToast({msg:co.name+' gespeichert'});};
  const del=(id)=>{const co=cos.find(c=>c.id===id);if(window.confirm(co?co.name+' löschen?':'Löschen?')){setCos(p=>p.filter(c=>c.id!==id));setToast({msg:'Gelöscht'});}};
  const reset=()=>{if(window.confirm('Auf Seed-Daten zurücksetzen?')){setCos(SEED);setToast({msg:'Zurückgesetzt'});}};

  const syncFromJSONBin=async()=>{
    setSyncing(true);
    try{
      const r1=await fetch('https://api.jsonbin.io/v3/b/'+JSONBIN_ID+'/latest',{headers:{'X-Master-Key':JSONBIN_KEY,'X-Bin-Meta':'false'}});
      if(!r1.ok) throw new Error('HTTP '+r1.status);
      const d=await r1.json();
      if(d.companies&&Array.isArray(d.companies)){setCos(d.companies);localStorage.setItem(SK,JSON.stringify(d.companies));setToast({msg:d.companies.length+' Analysen geladen'});setSyncStatus('ok');}
      if(d.newsCache&&Array.isArray(d.newsCache)&&d.newsCache.length>0){setNewsCache(d.newsCache);setNewsCacheUpdatedAt(d.newsCacheUpdatedAt||'');}
    }catch(e){setToast({msg:'Sync fehlgeschlagen: '+e.message,err:true});setSyncStatus('err');}
    setSyncing(false);
  };

  const pushToJSONBin=async()=>{
    setSyncing(true);
    try{
      const r=await fetch('https://api.jsonbin.io/v3/b/'+JSONBIN_ID,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':JSONBIN_KEY},body:JSON.stringify({companies:cos,newsCache:newsCache,newsCacheUpdatedAt:newsCacheUpdatedAt||'',updatedAt:new Date().toISOString()})});
      if(!r.ok) throw new Error('HTTP '+r.status);
      setToast({msg:cos.length+' Analysen nach JSONBin gepusht'});setSyncStatus('ok');
    }catch(e){setToast({msg:'Push fehlgeschlagen: '+e.message,err:true});setSyncStatus('err');}
    setSyncing(false);
  };

  const buys=cos.filter(c=>c.rating==='KAUFEN').length;
  const avgSc=cos.length?Math.round(cos.reduce((a,c)=>a+avg(c.scores),0)/cos.length*10)/10:0;
  const allEvts=cos.flatMap(c=>c.events.filter(e=>e.title)).length;

  return <>
    <div className="hdr">
      <div>
        <h1>Portfolio <span>Aktienanalysen</span></h1>
        <div className="hdr-sub">
          Aktienanalyse Canvas v2.2
          <span className={'sync-dot '+(syncStatus==='spin'?'spin':syncStatus==='ok'?'ok':'err')}></span>
          <span style={{fontSize:11}}>{syncStatus==='spin'?'Sync...':syncStatus==='ok'?'JSONBin verbunden':'Offline'}</span>
        </div>
      </div>
      <div className="hdr-stats">
        <div className="hs"><div className="hs-v">{cos.length}</div><div className="hs-l">Analysen</div></div>
        <div className="hs"><div className="hs-v" style={{color:'var(--grn)'}}>{buys}x</div><div className="hs-l">Kaufen</div></div>
        <div className="hs"><div className="hs-v">{avgSc}</div><div className="hs-l">Score</div></div>
        <div className="hs"><div className="hs-v">{allEvts}</div><div className="hs-l">Events</div></div>
      </div>
    </div>
    <div className="tabs">
      <button className={'tab'+(tab==='overview'?' active':'')} onClick={()=>setTab('overview')}>Übersicht</button>
      <button className={'tab'+(tab==='events'?' active':'')} onClick={()=>setTab('events')}>Upcoming Events</button>
      <button className={'tab'+(tab==='news'?' active':'')} onClick={()=>setTab('news')}>News Scan</button>
      <button className={'tab'+(tab==='manage'?' active':'')} onClick={()=>setTab('manage')}>Verwalten</button>
      <button className={'tab'+(tab==='make'?' active':'')} onClick={()=>setTab('make')}>Make.com</button>
    </div>
    <div className="main">
      {tab==='overview'&&<OverviewTab companies={cos}/>}
      {tab==='events'&&<EventsTab companies={cos} newsCache={newsCache}/>}
      {tab==='news'&&<NewsTab companies={cos} newsCache={newsCache}/>}
      {tab==='manage'&&<ManageTab companies={cos} onAdd={()=>setModal(blankCo())} onEdit={c=>setModal(JSON.parse(JSON.stringify(c)))} onDelete={del} onReset={reset} onSync={syncFromJSONBin} onPush={pushToJSONBin} syncing={syncing}/>}
      {tab==='make'&&<MakeTab/>}
    </div>
    {modal&&<ModalForm co={modal} onSave={save} onClose={()=>setModal(null)}/>}
    {toast&&<Toast msg={toast.msg} err={toast.err} onDone={()=>setToast(null)}/>}
  </>
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
